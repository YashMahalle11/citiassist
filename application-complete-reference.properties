# ============================================================================
# CitiAssist Backend - Complete Configuration Reference
# ============================================================================
# This file documents all available configuration options
# Copy specific properties to application.properties as needed
# ============================================================================

# ============================================================================
# Application Configuration
# ============================================================================

# Application name and version
app.name=CitiAssist
app.version=1.0.0
app.description=Production-grade Banking Chatbot Backend
app.organization=Citi

# ============================================================================
# Server Configuration
# ============================================================================

# Server port
server.port=8080

# Server context path (base URL)
server.servlet.context-path=/api

# Server shutdown behavior: immediate, graceful
server.shutdown=graceful

# Graceful shutdown timeout
server.shutdown.wait-time=30s

# Server error handling
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=on-param
server.error.include-exception=false

# Compression
server.compression.enabled=true
server.compression.min-response-size=1024

# ============================================================================
# Servlet Configuration
# ============================================================================

# Default character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Multipart upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ============================================================================
# Logging Configuration
# ============================================================================

# Root log level: TRACE, DEBUG, INFO, WARN, ERROR, FATAL, OFF
logging.level.root=INFO

# Application-specific log levels
logging.level.com.citi.citiassist=DEBUG
logging.level.com.citi.citiassist.config=DEBUG
logging.level.com.citi.citiassist.controller=DEBUG
logging.level.com.citi.citiassist.service=DEBUG
logging.level.com.citi.citiassist.security=DEBUG

# Framework log levels
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.data=DEBUG
logging.level.org.springframework.boot.actuate=DEBUG
logging.level.org.hibernate=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# Log format
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Log file configuration
logging.file.name=logs/citiassist.log
logging.file.max-size=10MB
logging.file.max-history=30
logging.file.total-size-cap=1GB

# ============================================================================
# Database Configuration
# ============================================================================

# ---- H2 Database (Development) ----
spring.datasource.url=jdbc:h2:mem:citiassist;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---- PostgreSQL (Production Example) ----
# spring.datasource.url=jdbc:postgresql://localhost:5432/citiassist
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=citiassist
# spring.datasource.password=${DB_PASSWORD}

# ---- MySQL (Alternative) ----
# spring.datasource.url=jdbc:mysql://localhost:3306/citiassist
# spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
# spring.datasource.username=citiassist
# spring.datasource.password=${DB_PASSWORD}

# Connection pooling
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.auto-commit=true

# ============================================================================
# JPA/Hibernate Configuration
# ============================================================================

# Database platform
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQL10Dialect

# DDL auto strategy: create, create-drop, validate, update, none
spring.jpa.hibernate.ddl-auto=create-drop

# Hibernate properties
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
spring.jpa.properties.hibernate.generate_statistics=false

# Dialect-specific settings
spring.jpa.properties.hibernate.dialect.H2=org.hibernate.dialect.H2Dialect

# ============================================================================
# H2 Database Console (Development Only)
# ============================================================================

# Enable H2 console
spring.h2.console.enabled=true

# H2 console path
spring.h2.console.path=/h2-console

# H2 console settings
spring.h2.console.settings.web-allow-others=false
spring.h2.console.settings.trace=false

# ============================================================================
# Spring WebSocket Configuration
# ============================================================================

# WebSocket support
spring.websocket.broker.enabled=true

# WebSocket buffer size
spring.websocket.buffer-size=32768

# STOMP heartbeat interval (milliseconds)
spring.websocket.heartbeat-interval=25000

# Message broker settings
spring.websocket.message-broker-relay.enabled=false
spring.websocket.message-broker-relay.relay-host=localhost
spring.websocket.message-broker-relay.relay-port=61613

# ============================================================================
# Spring Security Configuration
# ============================================================================

# Default user credentials (development only)
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN,USER

# Spring Security properties
spring.security.require-ssl=false
spring.security.enable-csrf=false

# ============================================================================
# Jackson Configuration (JSON Processing)
# ============================================================================

# JSON serialization
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.serialization.write-enums-using-to-string=true

# JSON deserialization
spring.jackson.deserialization.fail-on-unknown-properties=false
spring.jackson.deserialization.accept-single-value-as-array=true

# Property inclusion
spring.jackson.default-property-inclusion=non_null

# Date/time handling
spring.jackson.time-zone=UTC
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss

# ============================================================================
# Spring Boot Actuator Configuration (Health & Monitoring)
# ============================================================================

# Endpoints to expose
management.endpoints.web.exposure.include=health,info,metrics,prometheus,env,loggers
management.endpoints.web.exposure.exclude=

# Endpoint settings
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.endpoint.health.probes.enabled=true
management.endpoint.health.livenessState.enabled=true
management.endpoint.health.readinessState.enabled=true

# Health check settings
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.health.defaults.enabled=true
management.health.db.enabled=true

# Metrics configuration
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.export.prometheus.enabled=true

# Info endpoint
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# ============================================================================
# Application Metadata (Info Endpoint)
# ============================================================================

info.app.name=CitiAssist Backend
info.app.version=1.0.0
info.app.description=Production-grade banking chatbot backend
info.company.name=Citi
info.company.url=https://www.citigroup.com
info.team.name=CitiAssist Development Team
info.java.version=21

# ============================================================================
# Spring Data Configuration
# ============================================================================

# Pagination defaults
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.one-indexed-parameters=false

# JPA auditing
spring.data.jpa.repositories.bootstrap-mode=default

# ============================================================================
# Template Configuration (if using Thymeleaf)
# ============================================================================

# spring.thymeleaf.enabled=false
# spring.thymeleaf.cache=true
# spring.thymeleaf.mode=HTML

# ============================================================================
# HTTP Encoding
# ============================================================================

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# ============================================================================
# Task Execution (Thread Pool)
# ============================================================================

# For @EnableAsync
spring.task.execution.pool.core-size=8
spring.task.execution.pool.max-size=16
spring.task.execution.pool.queue-capacity=100
spring.task.execution.thread-name-prefix=citassist-async-

# For @EnableScheduling
spring.task.scheduling.pool.size=4
spring.task.scheduling.thread-name-prefix=citassist-sched-

# ============================================================================
# Resource Configuration
# ============================================================================

# Static resources
spring.resources.add-mappings=true
spring.resources.cache.period=86400

# MVC configuration
spring.mvc.locale-resolver=fixed
spring.mvc.locale=en_US

# ============================================================================
# Profiles
# ============================================================================

# Active profile: dev, test, prod
spring.profiles.active=dev

# Profile-specific property files
# application-dev.properties (development)
# application-test.properties (testing)
# application-prod.properties (production)

# ============================================================================
# Custom Application Properties
# ============================================================================

# Chatbot settings
chatbot.name=CitiAssist
chatbot.version=1.0.0
chatbot.max-concurrent-conversations=100
chatbot.message-history-size=50
chatbot.timeout-seconds=30

# Security settings
security.jwt.secret=your-secret-key-change-in-production
security.jwt.expiration=86400000
security.cors.allowed-origins=http://localhost:3000,http://localhost:4200
security.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
security.cors.max-age=3600

# Feature flags
feature.real-time-chat=true
feature.sentiment-analysis=false
feature.nlp-processing=true
feature.audit-logging=true

# Rate limiting
rate-limit.enabled=true
rate-limit.requests-per-minute=100

# ============================================================================
# Notes
# ============================================================================

# 1. This file shows ALL possible configuration options
# 2. Only properties needed in application.properties should be uncommented
# 3. Sensitive data (passwords, keys) should use environment variables: ${ENV_VAR}
# 4. Different profiles (dev/prod) should have separate property files
# 5. Log level guidelines:
#    - TRACE: Very detailed debugging information
#    - DEBUG: Debugging information
#    - INFO: Informational messages (default)
#    - WARN: Warning messages
#    - ERROR: Error messages
# 6. For production, ensure:
#    - Strong database passwords
#    - HTTPS/TLS enabled
#    - Proper CORS configuration
#    - Enhanced logging and monitoring
#    - Security headers configured
#    - Rate limiting enabled

# ============================================================================
# Environment Variables (for sensitive data)
# ============================================================================

# Instead of hardcoding passwords, use environment variables:
# spring.datasource.password=${DB_PASSWORD}
# security.jwt.secret=${JWT_SECRET}
# spring.security.user.password=${ADMIN_PASSWORD}

# Set in Windows PowerShell:
# $env:DB_PASSWORD = "your-database-password"
# $env:JWT_SECRET = "your-jwt-secret"
# $env:ADMIN_PASSWORD = "your-admin-password"

# ============================================================================
