# ============================================================================
# CitiAssist Backend - Application Configuration
# ============================================================================

# Application
spring.application.name=CitiAssist Backend
server.port=8080
server.servlet.context-path=/api

# ============================================================================
# Logging Configuration
# ============================================================================
logging.level.root=INFO
logging.level.com.citi.citiassist=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/citiassist.log

# ============================================================================
# H2 Database Configuration (Development)
# ============================================================================
spring.datasource.url=jdbc:h2:mem:citiassist;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (only enable in dev/test)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================================
# JPA/Hibernate Configuration
# ============================================================================
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.generate_statistics=false

# ============================================================================
# WebSocket Configuration
# ============================================================================
spring.websocket.broker.enabled=true
spring.websocket.buffer-size=32768
spring.websocket.heartbeat-interval=25000

# ============================================================================
# Spring Security Configuration
# ============================================================================
spring.security.user.name=admin
spring.security.user.password=admin123

# ============================================================================
# Jackson Configuration
# ============================================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.serialization.indent-output=true
spring.jackson.default-property-inclusion=non_null
spring.jackson.time-zone=UTC

# ============================================================================
# Actuator Configuration (Health Checks)
# ============================================================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.endpoint.health.show-components=when-authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true
management.endpoint.health.probes.enabled=true

# ============================================================================
# Application Metadata
# ============================================================================
app.name=CitiAssist
app.version=1.0.0
app.description=Production-grade Banking Chatbot Backend
app.organization=Citi
